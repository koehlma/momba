name: Release

on:
  create:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build_momba:
    name: Build Momba
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.8
      uses: actions/setup-python@v2
      with:
        python-version: "3.8"
    - name: Install Poetry
      run: python -m pip install poetry tomlkit
    - name: Build momba
      run: python release.py
    - uses: actions/upload-artifact@v2
      with:
        name: packages
        path: ./dist/*

  build_engine_sdist:
    name: Build Engine Source Distribution
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: "3.8"
      - name: Install Maturin
        run: python -m pip install git+https://github.com/koehlma/maturin.git
      - name: Build engine sdist
        run: |
          cd engine
          maturin sdist -o dist
      - uses: actions/upload-artifact@v2
        with:
          name: packages
          path: ./engine/dist/*.tar.gz

  build_engine_wheels_linux:
    name: Build Linux Engine Wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: "3.8"
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.2.2
      - name: Build wheels
        run: |
          cd engine
          python -m cibuildwheel --output-dir ../wheelhouse
        env:
          CIBW_ARCHS: auto64
          CIBW_BUILD: cp38-* cp39-* cp310-*
          CIBW_SKIP: "*-musllinux_*"
          CIBW_BEFORE_BUILD_LINUX: curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          CIBW_ENVIRONMENT_LINUX: PATH=$HOME/.cargo/bin:$PATH
      - uses: actions/upload-artifact@v2
        with:
          name: packages
          path: ./wheelhouse/*.whl
  
  build_engine_wheels_windows:
    name: Build Windows Engine Wheels (Python ${{ matrix.python }})
    runs-on: macos-latest
    strategy:
      matrix:
        python: ["3.8", "3.9", "3.10"]
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python }}
          architecture: x64
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          default: true
      - name: Build Wheels (x86_64)
        uses: messense/maturin-action@v1
        with:
          target: x86_64
          args: --release --out wheelhouse -m engine/Cargo.toml --no-sdist
      - uses: actions/upload-artifact@v2
        with:
          name: packages
          path: ./wheelhouse/*.whl
  
  build_engine_wheels_macos:
    name: Build MacOS Engine Wheels (Python ${{ matrix.python }})
    runs-on: macos-latest
    strategy:
      matrix:
        python: ["3.8", "3.9", "3.10"]
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python }}
          architecture: x64
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          default: true
      - name: Build Wheels (x86_64)
        uses: messense/maturin-action@v1
        with:
          target: x86_64
          args: --release --out wheelhouse -m engine/Cargo.toml --no-sdist
      - name: Build Wheels (aarch64)
        uses: messense/maturin-action@v1
        with:
          target: aarch64
          args: --release --out wheelhouse -m engine/Cargo.toml --no-sdist
      - name: Build Wheels (universal2)
        uses: messense/maturin-action@v1
        with:
          args: --release --universal2 --out wheelhouse -m engine/Cargo.toml --no-sdist
      - uses: actions/upload-artifact@v2
        with:
          name: packages
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-20.04
    environment: pypi
    if: github.event_name == 'create' && startsWith(github.ref, 'refs/tags/v')
    needs: [build_momba, build_engine_sdist, build_engine_wheels, build_engine_wheels_macos]
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v2
      with:
        name: packages
        path: dist
    - name: Display files
      run: ls -l dist
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        verify_metadata: false
        password: ${{ secrets.PYPI_API_TOKEN }}
